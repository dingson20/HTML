<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CABUYAO AUX REPORT - Professional Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --total-bg: #eff6ff;
            --total-text: #1e40af;
            --success: #10b981;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin: 0 0 30px 0; 
            font-size: 24px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .tabs { 
            display: flex; 
            border-bottom: 2px solid var(--border); 
            margin-bottom: 25px; 
            gap: 5px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 24px; 
            border: none; 
            background: none; 
            cursor: pointer;
            font-size: 15px; 
            font-weight: 600; 
            color: var(--text-muted); 
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--primary); background: #f1f5f9; }
        .tab-btn.active { 
            color: var(--primary); 
            background: #eff6ff; 
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .controls { 
            display: flex; 
            gap: 12px; 
            align-items: flex-end; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            padding: 10px 14px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 14px; 
            font-family: inherit;
            background: white;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea {
            width: 100%; 
            height: 250px; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 13px; 
            resize: vertical;
        }
        
        .btn {
            padding: 10px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 14px; 
            font-weight: 600; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }

        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 10px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px; 
            min-width: 800px;
        }
        th, td { 
            padding: 12px 16px; 
            border-bottom: 1px solid var(--border); 
            text-align: left; 
        }
        th { 
            background: #f8fafc; 
            font-weight: 600; 
            color: var(--text-muted); 
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        
        .total-row { 
            font-weight: 700; 
            background: var(--total-bg) !important; 
            color: var(--total-text);
            border-top: 2px solid var(--primary);
        }
        .total-row td { padding: 14px 16px; font-size: 15px; }
        .total-row:hover td { background: var(--total-bg) !important; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }
        .hidden { display: none !important; }
        
        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .daily-header h3 { margin: 0; color: var(--text); }
        .daily-actions { display: flex; gap: 8px; }
        
        .save-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .rank-1 { background: #fffbeb !important; font-weight: 700; }
        .rank-2 { background: #f8fafc !important; }
        .rank-3 { background: #fff7ed !important; }
        .medal { font-size: 18px; margin-right: 6px; }
        .ranking-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .ranking-card h3 { margin-top: 0; color: var(--primary); font-size: 16px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 CABUYAO AUX REPORT - Smart Dashboard</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="paste" onclick="switchTab('paste')">📋 Smart Paste</button>
        <button class="tab-btn" data-tab="daily" onclick="switchTab('daily')">📅 Daily Reports</button>
        <button class="tab-btn" data-tab="summary" onclick="switchTab('summary')">📈 Summary</button>
        <button class="tab-btn" data-tab="ranking" onclick="switchTab('ranking')">🏆 Branch Ranking</button>
        <button class="tab-btn" data-tab="individual" onclick="switchTab('individual')">👤 Individual Sales</button>
    </div>

    <!-- SMART PASTE TAB -->
    <div id="paste" class="tab-content active">
        <div class="controls">
            <button class="btn btn-primary" onclick="parseData()">🔍 Parse & Auto-Save</button>
            <button class="btn btn-secondary" onclick="clearTextarea()">🗑️ Clear</button>
            <div id="saveIndicator" class="hidden"></div>
        </div>
        <textarea id="inputText" placeholder="Paste your daily cluster report here...&#10;&#10;Supports formats like:&#10;JULY 14, 2026&#10;July 14,2026&#10;☑️CLH CABUYAO 1&#10;PMAX= 47"></textarea>
        
        <div id="previewSection" class="hidden">
            <h3 style="margin-top: 25px; color: var(--text);">Preview Parsed Data</h3>
            <div class="table-wrapper">
                <table id="previewTable">
                    <thead>
                        <tr>
                            <th>Branch</th><th>PMAX</th><th>MSA Pcs</th>
                            <th>Deposit Amt</th><th>Deposit Pcs</th><th>PCP</th><th>HMAX</th>
                            <th>Penetration (With/Total)</th><th>Pen %</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- DAILY REPORTS TAB -->
    <div id="daily" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>Select Date (Calendar)</label>
                <input type="date" id="dailyDateInput" onchange="renderDailyReport()" style="min-width: 200px;">
            </div>
            <button class="btn btn-danger" style="margin-left: auto;" onclick="clearAllData()">🗑️ Clear All Data</button>
        </div>
        <div id="dailyReportContainer"></div>
    </div>

    <!-- SUMMARY REPORT TAB -->
    <div id="summary" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>From Date</label>
                <input type="date" id="summaryFromDate" onchange="renderSummaryReport()">
            </div>
            <div class="control-group">
                <label>To Date</label>
                <input type="date" id="summaryToDate" onchange="renderSummaryReport()">
            </div>
            <div class="control-group">
                <label>Group By</label>
                <select id="summaryGroupBy" onchange="renderSummaryReport()">
                    <option value="branch">By Branch</option>
                    <option value="week">By Week</option>
                    <option value="month">By Month</option>
                </select>
            </div>
            <button class="btn btn-success" style="margin-left: auto;" onclick="exportSummaryCSV()">⬇️ Export CSV</button>
        </div>
        <div class="table-wrapper">
            <table id="summaryTable">
                <thead>
                    <tr id="summaryTableHead"></tr>
                </thead>
                <tbody id="summaryTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- BRANCH RANKING TAB -->
    <div id="ranking" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>From Date</label>
                <input type="date" id="rankFromDate" onchange="renderRankingReport()">
            </div>
            <div class="control-group">
                <label>To Date</label>
                <input type="date" id="rankToDate" onchange="renderRankingReport()">
            </div>
            <div class="control-group">
                <label>Rank By Category</label>
                <select id="rankCategory" onchange="renderRankingReport()">
                    <option value="pmax">Total PMAX</option>
                    <option value="msa_pcs">Total MSA Pcs</option>
                    <option value="deposit_amount">Total Deposit Amount</option>
                    <option value="deposit_pcs">Total Deposit Pcs</option>
                    <option value="pen_pct">Penetration Rate (%)</option>
                </select>
            </div>
        </div>
        <div id="rankingContainer"></div>
    </div>

    <!-- INDIVIDUAL SALES TAB -->
    <div id="individual" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>From Date</label>
                <input type="date" id="indFromDate" onchange="renderIndividualReport()">
            </div>
            <div class="control-group">
                <label>To Date</label>
                <input type="date" id="indToDate" onchange="renderIndividualReport()">
            </div>
            <div class="control-group">
                <label>Rank By</label>
                <select id="indRankBy" onchange="renderIndividualReport()">
                    <option value="pmax">PMAX</option>
                    <option value="msa_pcs">MSA Pcs</option>
                    <option value="combined">Combined Score</option>
                </select>
            </div>
        </div>
        <div id="individualContainer"></div>
    </div>
</div>

<script>
    let parsedRecords = [];

    // Robust date parser - handles all formats
    function parseDisplayDate(str) {
        const months = { 
            JANUARY: '01', JAN: '01', FEBRUARY: '02', FEB: '02', 
            MARCH: '03', MAR: '03', APRIL: '04', APR: '04', 
            MAY: '05', JUNE: '06', JUN: '06', JULY: '07', JUL: '07', 
            AUGUST: '08', AUG: '08', SEPTEMBER: '09', SEP: '09', SEPT: '09',
            OCTOBER: '10', OCT: '10', NOVEMBER: '11', NOV: '11', 
            DECEMBER: '12', DEC: '12' 
        };
        // Remove commas, normalize spaces
        const cleaned = str.toUpperCase().replace(/,/g, ' ').replace(/\s+/g, ' ').trim();
        const parts = cleaned.split(' ');
        if (parts.length >= 3) {
            const month = months[parts[0]];
            const day = parts[1].padStart(2, '0');
            const year = parts[2];
            if (month && /^\d{4}$/.test(year)) {
                return `${year}-${month}-${day}`;
            }
        }
        return null;
    }

    function formatCurrency(num) {
        return '₱' + Number(num).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    // Strip emojis and icons from text
    function stripIcons(text) {
        return text.replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FEFF}]|[\u{1F900}-\u{1F9FF}]|[\u{200D}]|[\u{20E3}]|[\u{E0020}-\u{E007F}]|[☑️✅❌📍•⭐🔸🔹🔶🔷✔✖]/gu, '').trim();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
        
        if (tabId === 'daily') {
            populateDailyDatePicker();
        }
        if (tabId === 'summary') {
            if (!document.getElementById('summaryFromDate').value) {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('summaryFromDate').value = today;
                document.getElementById('summaryToDate').value = today;
            }
            renderSummaryReport();
        }
        if (tabId === 'ranking') {
            if (!document.getElementById('rankFromDate').value) {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('rankFromDate').value = today;
                document.getElementById('rankToDate').value = today;
            }
            renderRankingReport();
        }
        if (tabId === 'individual') {
            if (!document.getElementById('indFromDate').value) {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('indFromDate').value = today;
                document.getElementById('indToDate').value = today;
            }
            renderIndividualReport();
        }
    }

    function clearTextarea() {
        document.getElementById('inputText').value = '';
        document.getElementById('previewSection').classList.add('hidden');
    }

    function parseData() {
        const text = document.getElementById('inputText').value;
        if (!text.trim()) {
            alert("❌ Please paste data first!");
            return;
        }
        
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        parsedRecords = [];
        let currentDate = '';
        let currentIsoDate = '';
        let currentRecord = {};
        let inPmaxSection = false;
        let inMsaSection = false;

        for (let i = 0; i < lines.length; i++) {
            const originalLine = lines[i];
            const line = stripIcons(originalLine); // Strip icons before parsing
            
            // Date detection - handles "JULY 14, 2026", "July 14,2026", "July 14 2026", etc.
            const dateMatch = line.match(/^([A-Za-z]+\s+\d{1,2}\s*,?\s*\d{4})/i);
            if (dateMatch) {
                currentDate = dateMatch[1].toUpperCase();
                currentIsoDate = parseDisplayDate(currentDate);
                continue;
            }

            // Branch detection - icons already stripped
            const branchMatch = line.match(/^CLH\s+([A-Z0-9\s\-]+?)(?:\s*\(|$)/i);
            if (branchMatch) {
                if (currentRecord.branch) parsedRecords.push(currentRecord);
                currentRecord = {
                    date: currentDate,
                    isoDate: currentIsoDate,
                    branch: "CLH " + branchMatch[1].trim(),
                    pmax: 0, msa_pcs: 0, deposit_amount: 0, deposit_pcs: 0, 
                    pcp: 0, hmax: 0, pen_with: 0, pen_total: 0, pen_pct: 0,
                    individual_sales: []
                };
                inPmaxSection = false;
                inMsaSection = false;
                continue;
            }

            if (!currentRecord.branch) continue;

            if (line.match(/^PMAX\s*[=\-]\s*/i)) {
                const raw = line.replace(/^PMAX\s*[=\-]\s*/i, '').trim();
                const numMatch = raw.match(/(\d+)/); 
                currentRecord.pmax = numMatch ? parseInt(numMatch[1]) : 0;
                inPmaxSection = true;
                inMsaSection = false;
            } else if (line.match(/^MSA\s*[=\-\/]\s*/i)) {
                const raw = line.replace(/^MSA\s*[=\-\/]\s*/i, '').trim();
                const nums = raw.match(/\d+/g);
                if (nums) {
                    currentRecord.msa_pcs = nums.length > 1 ? parseInt(nums[nums.length - 1]) : parseInt(nums[0]);
                }
                inPmaxSection = false;
                inMsaSection = true;
            } else if (line.match(/^Deposit\s*[=\-]\s*/i)) {
                const raw = line.replace(/^Deposit\s*[=\-]\s*/i, '').trim();
                // Handle formats like "Cash Agent - 144800 / 3, POS - 107500 - , 2 )"
                // Sum all amounts and pieces
                const amountMatches = raw.match(/[\d,]+/g);
                let totalAmount = 0;
                let totalPcs = 0;
                
                if (amountMatches) {
                    // Find the split between amounts and pieces
                    const slashMatch = raw.match(/[\d,]+\s*[\/\(\)]\s*(\d+)/);
                    if (slashMatch) {
                        // Has format like "144800 / 3"
                        const parts = raw.split(/[\/\(\)]/);
                        if (parts.length >= 2) {
                            const amtPart = parts[0].replace(/[^\d,]/g, '').replace(/,/g, '');
                            const pcsPart = parts[1].match(/\d+/);
                            totalAmount = parseInt(amtPart) || 0;
                            totalPcs = pcsPart ? parseInt(pcsPart[0]) : 0;
                        }
                    } else {
                        // Simple format like "22,019 /3" or "100"
                        const cleanRaw = raw.replace(/[^\d\/\,\(\)]/gi, '');
                        const parts = cleanRaw.split(/[\s\/\(\)]+/).filter(p => p.length > 0);
                        if (parts.length >= 2) {
                            totalAmount = parseInt(parts[0].replace(/,/g, '')) || 0;
                            totalPcs = parseInt(parts[1]) || 0;
                        } else if (parts.length === 1) {
                            totalAmount = parseInt(parts[0].replace(/,/g, '')) || 0;
                        }
                    }
                }
                
                currentRecord.deposit_amount = totalAmount;
                currentRecord.deposit_pcs = totalPcs;
                inPmaxSection = false;
                inMsaSection = false;
            } else if (line.match(/^PCP\s*[=\-]\s*/i)) {
                const val = line.replace(/^PCP\s*[=\-]\s*/i, '').trim();
                currentRecord.pcp = parseInt(val) || 0;
                inPmaxSection = false;
                inMsaSection = false;
            } else if (line.match(/^HMAX\s*[=\-]\s*/i)) {
                const val = line.replace(/^HMAX\s*[=\-]\s*/i, '').trim();
                currentRecord.hmax = parseInt(val) || 0;
                inPmaxSection = false;
                inMsaSection = false;
            } else if (line.match(/^PENETRATION RATE\s*[=\-]\s*/i)) {
                const raw = line.replace(/^PENETRATION RATE\s*[=\-]\s*/i, '').trim();
                const match = raw.match(/(\d+)\s*\/\s*(\d+)\s*=?\s*([\d\.]+)%?/);
                if (match) {
                    currentRecord.pen_with = parseInt(match[1]);
                    currentRecord.pen_total = parseInt(match[2]);
                    currentRecord.pen_pct = parseFloat(match[3]);
                }
                inPmaxSection = false;
                inMsaSection = false;
            } else if (inPmaxSection && (line.match(/^\t/) || line.match(/^\s{2,}/) || line.match(/^[A-Za-z]+\s*[\-]\s*\d+/))) {
                // Individual PMAX entry
                const nameMatch = line.match(/^([A-Za-z\s]+?)[\-\s]+(\d+)/);
                if (nameMatch) {
                    const name = nameMatch[1].trim().toUpperCase();
                    const pmax = parseInt(nameMatch[2]);
                    let salesPerson = currentRecord.individual_sales.find(s => s.name === name);
                    if (!salesPerson) {
                        salesPerson = { name, pmax: 0, msa_pcs: 0 };
                        currentRecord.individual_sales.push(salesPerson);
                    }
                    salesPerson.pmax = pmax;
                }
            } else if (inMsaSection && (line.match(/^\t/) || line.match(/^\s{2,}/) || line.match(/^[A-Za-z]+\s*[\-]\s*\d+/))) {
                // Individual MSA entry
                const nameMatch = line.match(/^([A-Za-z\s]+?)[\-\s]+(\d+)/);
                if (nameMatch) {
                    const name = nameMatch[1].trim().toUpperCase();
                    const msa = parseInt(nameMatch[2]);
                    let salesPerson = currentRecord.individual_sales.find(s => s.name === name);
                    if (!salesPerson) {
                        salesPerson = { name, pmax: 0, msa_pcs: 0 };
                        currentRecord.individual_sales.push(salesPerson);
                    }
                    salesPerson.msa_pcs = msa;
                }
            }
        }
        if (currentRecord.branch) parsedRecords.push(currentRecord);

        if (parsedRecords.length === 0) {
            alert("❌ No valid data found. Please check your format.");
            return;
        }

        if (!currentIsoDate) {
            alert("❌ No date found in the pasted data. Please include a date like 'JULY 14, 2026' at the top.");
            return;
        }

        autoSaveData();
        renderPreview();
    }

    function autoSaveData() {
        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        const isoDate = parsedRecords[0].isoDate;
        const rawText = document.getElementById('inputText').value;

        allData[isoDate] = {
            rawText: rawText,
            records: parsedRecords
        };

        localStorage.setItem('cabuyao_aux_reports', JSON.stringify(allData));
        
        const indicator = document.getElementById('saveIndicator');
        indicator.innerHTML = `✅ Auto-saved for ${parsedRecords[0].date} (${parsedRecords.length} branches)`;
        indicator.classList.remove('hidden');
        
        setTimeout(() => {
            indicator.classList.add('hidden');
        }, 4000);
    }

    function renderPreview() {
        const tbody = document.querySelector('#previewTable tbody');
        tbody.innerHTML = '';
        let totals = { pmax: 0, msa_pcs: 0, dep_amt: 0, dep_pcs: 0, pcp: 0, hmax: 0, pen_with: 0, pen_total: 0 };

        parsedRecords.forEach(rec => {
            totals.pmax += rec.pmax; totals.msa_pcs += rec.msa_pcs;
            totals.dep_amt += rec.deposit_amount; totals.dep_pcs += rec.deposit_pcs;
            totals.pcp += rec.pcp; totals.hmax += rec.hmax;
            totals.pen_with += rec.pen_with; totals.pen_total += rec.pen_total;

            tbody.innerHTML += `<tr>
                <td><strong>${rec.branch}</strong></td><td>${rec.pmax}</td>
                <td>${rec.msa_pcs}</td>
                <td>${formatCurrency(rec.deposit_amount)}</td><td>${rec.deposit_pcs}</td>
                <td>${rec.pcp}</td><td>${rec.hmax}</td>
                <td>${rec.pen_with} / ${rec.pen_total}</td><td>${rec.pen_pct}%</td>
            </tr>`;
        });

        const avgPen = totals.pen_total > 0 ? ((totals.pen_with / totals.pen_total) * 100).toFixed(2) : '0.00';
        tbody.innerHTML += `<tr class="total-row">
            <td>AREA TOTAL</td><td>${totals.pmax}</td><td>${totals.msa_pcs}</td>
            <td>${formatCurrency(totals.dep_amt)}</td><td>${totals.dep_pcs}</td>
            <td>${totals.pcp}</td><td>${totals.hmax}</td>
            <td>${totals.pen_with} / ${totals.pen_total}</td><td>${avgPen}%</td>
        </tr>`;
        document.getElementById('previewSection').classList.remove('hidden');
    }

    function populateDailyDatePicker() {
        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        const dates = Object.keys(allData).sort().reverse();
        const input = document.getElementById('dailyDateInput');
        
        // Set date input bounds based on available data
        if (dates.length > 0) {
            input.min = dates[dates.length - 1];
            input.max = dates[0];
            input.value = dates[0]; // Most recent date
        }
        
        renderDailyReport();
    }

    function renderDailyReport() {
        const date = document.getElementById('dailyDateInput').value;
        const container = document.getElementById('dailyReportContainer');
        
        if (!date) {
            container.innerHTML = '<div class="empty-state">📅 Please select a date from the calendar to view the daily report.</div>';
            return;
        }

        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        const dayData = allData[date];
        
        if (!dayData) {
            container.innerHTML = `<div class="empty-state">📭 No data found for ${date}.<br><br>Paste your report in the Smart Paste tab and click "Parse & Auto-Save".</div>`;
            return;
        }

        const records = dayData.records.sort((a, b) => a.branch.localeCompare(b.branch));
        const displayDate = records.length > 0 ? records[0].date : date;

        let html = `<div class="daily-header">
            <h3>📅 Report for: ${displayDate}</h3>
            <div class="daily-actions">
                <button class="btn btn-secondary btn-sm" onclick="editDate('${date}')">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteDate('${date}')">🗑️ Delete</button>
            </div>
        </div>`;

        html += `<div class="table-wrapper"><table><thead><tr>
            <th>Branch</th><th>PMAX</th><th>MSA Pcs</th><th>Deposit Amt</th><th>Deposit Pcs</th>
            <th>PCP</th><th>HMAX</th><th>Penetration (With/Total)</th><th>Pen %</th>
        </tr></thead><tbody>`;

        let totals = { pmax: 0, msa_pcs: 0, dep_amt: 0, dep_pcs: 0, pcp: 0, hmax: 0, pen_with: 0, pen_total: 0 };

        records.forEach(rec => {
            totals.pmax += rec.pmax; totals.msa_pcs += rec.msa_pcs;
            totals.dep_amt += rec.deposit_amount; totals.dep_pcs += rec.deposit_pcs;
            totals.pcp += rec.pcp; totals.hmax += rec.hmax;
            totals.pen_with += rec.pen_with; totals.pen_total += rec.pen_total;

            html += `<tr>
                <td><strong>${rec.branch}</strong></td><td>${rec.pmax}</td>
                <td>${rec.msa_pcs}</td>
                <td>${formatCurrency(rec.deposit_amount)}</td><td>${rec.deposit_pcs}</td>
                <td>${rec.pcp}</td><td>${rec.hmax}</td>
                <td>${rec.pen_with} / ${rec.pen_total}</td><td>${rec.pen_pct}%</td>
            </tr>`;
        });

        const avgPen = totals.pen_total > 0 ? ((totals.pen_with / totals.pen_total) * 100).toFixed(2) : '0.00';
        html += `<tr class="total-row">
            <td>AREA TOTAL</td><td>${totals.pmax}</td><td>${totals.msa_pcs}</td>
            <td>${formatCurrency(totals.dep_amt)}</td><td>${totals.dep_pcs}</td>
            <td>${totals.pcp}</td><td>${totals.hmax}</td>
            <td>${totals.pen_with} / ${totals.pen_total}</td><td>${avgPen}%</td>
        </tr></tbody></table></div>`;
        
        container.innerHTML = html;
    }

    function editDate(isoDate) {
        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        const dayData = allData[isoDate];
        if (dayData && dayData.rawText) {
            document.getElementById('inputText').value = dayData.rawText;
            switchTab('paste');
            alert("✅ Raw text loaded! Edit the data and click 'Parse & Auto-Save' to update.");
        }
    }

    function deleteDate(isoDate) {
        if (!confirm(`Delete report for ${isoDate}?`)) return;
        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        delete allData[isoDate];
        localStorage.setItem('cabuyao_aux_reports', JSON.stringify(allData));
        populateDailyDatePicker();
    }

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return `${d.getUTCFullYear()}-W${weekNo}`;
    }

    function getMonthString(isoDate) {
        const d = new Date(isoDate);
        return d.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
    }

    function renderSummaryReport() {
        const fromDate = document.getElementById('summaryFromDate').value;
        const toDate = document.getElementById('summaryToDate').value;
        const groupBy = document.getElementById('summaryGroupBy').value;
        const tbody = document.getElementById('summaryTableBody');
        const thead = document.getElementById('summaryTableHead');
        
        tbody.innerHTML = '';
        if (!fromDate || !toDate) return;

        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        
        let allRecords = [];
        for (const [isoDate, dayData] of Object.entries(allData)) {
            if (isoDate >= fromDate && isoDate <= toDate) {
                dayData.records.forEach(r => allRecords.push(r));
            }
        }

        if (allRecords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No data found for the selected date range.</td></tr>';
            return;
        }

        const groups = {};
        allRecords.forEach(r => {
            let key = r.branch;
            let label = r.branch;
            if (groupBy === 'week') { key = getWeekNumber(new Date(r.isoDate)); label = `Week ${key.split('-W')[1]}`; }
            if (groupBy === 'month') { key = getMonthString(r.isoDate); label = key; }

            if (!groups[key]) {
                groups[key] = { label, pmax: 0, msa_pcs: 0, dep_amt: 0, dep_pcs: 0, pcp: 0, hmax: 0, pen_with: 0, pen_total: 0, count: 0 };
            }
            groups[key].pmax += r.pmax;
            groups[key].msa_pcs += r.msa_pcs;
            groups[key].dep_amt += r.deposit_amount;
            groups[key].dep_pcs += r.deposit_pcs;
            groups[key].pcp += r.pcp;
            groups[key].hmax += r.hmax;
            groups[key].pen_with += r.pen_with;
            groups[key].pen_total += r.pen_total;
            groups[key].count += 1;
        });

        thead.innerHTML = `<th>${groupBy === 'branch' ? 'Branch' : (groupBy === 'week' ? 'Week' : 'Month')}</th>
            <th>Days Reported</th><th>Total PMAX</th><th>Total MSA Pcs</th>
            <th>Total Deposit Amt</th><th>Total Deposit Pcs</th><th>Total PCP</th><th>Total HMAX</th>
            <th>Penetration (With/Total)</th><th>Avg Pen %</th>`;

        let grandTotals = { pmax: 0, msa_pcs: 0, dep_amt: 0, dep_pcs: 0, pcp: 0, hmax: 0, pen_with: 0, pen_total: 0, count: 0 };
        const sortedKeys = Object.keys(groups).sort();

        sortedKeys.forEach(key => {
            const g = groups[key];
            grandTotals.pmax += g.pmax; grandTotals.msa_pcs += g.msa_pcs;
            grandTotals.dep_amt += g.dep_amt; grandTotals.dep_pcs += g.dep_pcs;
            grandTotals.pcp += g.pcp; grandTotals.hmax += g.hmax;
            grandTotals.pen_with += g.pen_with; grandTotals.pen_total += g.pen_total;
            grandTotals.count += g.count;

            const avgPen = g.pen_total > 0 ? ((g.pen_with / g.pen_total) * 100).toFixed(2) : '0.00';
            tbody.innerHTML += `<tr>
                <td><strong>${g.label}</strong></td><td>${g.count}</td><td>${g.pmax}</td>
                <td>${g.msa_pcs}</td>
                <td>${formatCurrency(g.dep_amt)}</td><td>${g.dep_pcs}</td>
                <td>${g.pcp}</td><td>${g.hmax}</td>
                <td>${g.pen_with} / ${g.pen_total}</td><td>${avgPen}%</td>
            </tr>`;
        });

        const grandAvgPen = grandTotals.pen_total > 0 ? ((grandTotals.pen_with / grandTotals.pen_total) * 100).toFixed(2) : '0.00';
        tbody.innerHTML += `<tr class="total-row">
            <td>AREA TOTAL</td><td>${grandTotals.count}</td><td>${grandTotals.pmax}</td>
            <td>${grandTotals.msa_pcs}</td>
            <td>${formatCurrency(grandTotals.dep_amt)}</td><td>${grandTotals.dep_pcs}</td>
            <td>${grandTotals.pcp}</td><td>${grandTotals.hmax}</td>
            <td>${grandTotals.pen_with} / ${grandTotals.pen_total}</td><td>${grandAvgPen}%</td>
        </tr>`;
    }

    function renderRankingReport() {
        const fromDate = document.getElementById('rankFromDate').value;
        const toDate = document.getElementById('rankToDate').value;
        const category = document.getElementById('rankCategory').value;
        const container = document.getElementById('rankingContainer');
        
        container.innerHTML = '';
        if (!fromDate || !toDate) return;

        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        let allRecords = [];
        for (const [isoDate, dayData] of Object.entries(allData)) {
            if (isoDate >= fromDate && isoDate <= toDate) {
                dayData.records.forEach(r => allRecords.push(r));
            }
        }

        if (allRecords.length === 0) {
            container.innerHTML = '<div class="empty-state">No data found for the selected date range.</div>';
            return;
        }

        const branchTotals = {};
        allRecords.forEach(r => {
            if (!branchTotals[r.branch]) {
                branchTotals[r.branch] = { branch: r.branch, pmax: 0, msa_pcs: 0, deposit_amount: 0, deposit_pcs: 0, pen_with: 0, pen_total: 0 };
            }
            branchTotals[r.branch].pmax += r.pmax;
            branchTotals[r.branch].msa_pcs += r.msa_pcs;
            branchTotals[r.branch].deposit_amount += r.deposit_amount;
            branchTotals[r.branch].deposit_pcs += r.deposit_pcs;
            branchTotals[r.branch].pen_with += r.pen_with;
            branchTotals[r.branch].pen_total += r.pen_total;
        });

        let rankedBranches = Object.values(branchTotals).map(b => {
            const pen_pct = b.pen_total > 0 ? ((b.pen_with / b.pen_total) * 100) : 0;
            return { ...b, pen_pct: parseFloat(pen_pct.toFixed(2)) };
        });

        rankedBranches.sort((a, b) => b[category] - a[category]);

        const categoryLabels = {
            pmax: 'Total PMAX',
            msa_pcs: 'Total MSA Pcs',
            deposit_amount: 'Total Deposit Amount',
            deposit_pcs: 'Total Deposit Pcs',
            pen_pct: 'Penetration Rate (%)'
        };

        let html = `<div class="ranking-card">
            <h3>🏆 Leaderboard: ${categoryLabels[category]}</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Rank</th>
                            <th>Branch</th>
                            <th>Value</th>
                            <th>Additional Context</th>
                        </tr>
                    </thead>
                    <tbody>`;

        rankedBranches.forEach((b, index) => {
            const rank = index + 1;
            let medal = '';
            let rowClass = '';
            if (rank === 1) { medal = '🥇'; rowClass = 'rank-1'; }
            else if (rank === 2) { medal = '🥈'; rowClass = 'rank-2'; }
            else if (rank === 3) { medal = '🥉'; rowClass = 'rank-3'; }

            let valueDisplay = '';
            let contextDisplay = '';

            if (category === 'deposit_amount') {
                valueDisplay = formatCurrency(b.deposit_amount);
                contextDisplay = `${b.deposit_pcs} pcs`;
            } else if (category === 'pen_pct') {
                valueDisplay = `${b.pen_pct}%`;
                contextDisplay = `${b.pen_with} / ${b.pen_total} clients`;
            } else if (category === 'pmax') {
                valueDisplay = b.pmax;
                contextDisplay = `MSA: ${b.msa_pcs} pcs`;
            } else if (category === 'msa_pcs') {
                valueDisplay = b.msa_pcs;
                contextDisplay = `PMAX: ${b.pmax}`;
            } else if (category === 'deposit_pcs') {
                valueDisplay = b.deposit_pcs;
                contextDisplay = formatCurrency(b.deposit_amount);
            }

            html += `<tr class="${rowClass}">
                <td><span class="medal">${medal}</span> #${rank}</td>
                <td><strong>${b.branch}</strong></td>
                <td style="font-weight: 700; font-size: 15px;">${valueDisplay}</td>
                <td style="color: var(--text-muted); font-size: 13px;">${contextDisplay}</td>
            </tr>`;
        });

        html += `</tbody></table></div></div>`;
        container.innerHTML = html;
    }

    function renderIndividualReport() {
        const fromDate = document.getElementById('indFromDate').value;
        const toDate = document.getElementById('indToDate').value;
        const rankBy = document.getElementById('indRankBy').value;
        const container = document.getElementById('individualContainer');
        
        container.innerHTML = '';
        if (!fromDate || !toDate) return;

        const allData = JSON.parse(localStorage.getItem('cabuyao_aux_reports') || '{}');
        let allSales = [];
        
        for (const [isoDate, dayData] of Object.entries(allData)) {
            if (isoDate >= fromDate && isoDate <= toDate) {
                dayData.records.forEach(r => {
                    if (r.individual_sales && r.individual_sales.length > 0) {
                        r.individual_sales.forEach(s => {
                            allSales.push({
                                name: s.name,
                                branch: r.branch,
                                pmax: s.pmax || 0,
                                msa_pcs: s.msa_pcs || 0,
                                date: r.date
                            });
                        });
                    }
                });
            }
        }

        if (allSales.length === 0) {
            container.innerHTML = '<div class="empty-state">No individual sales data found for the selected date range.</div>';
            return;
        }

        const individualTotals = {};
        allSales.forEach(s => {
            const key = `${s.name}|${s.branch}`;
            if (!individualTotals[key]) {
                individualTotals[key] = { name: s.name, branch: s.branch, pmax: 0, msa_pcs: 0, days: 0 };
            }
            individualTotals[key].pmax += s.pmax;
            individualTotals[key].msa_pcs += s.msa_pcs;
            individualTotals[key].days += 1;
        });

        let rankedIndividuals = Object.values(individualTotals).map(i => {
            const combined = i.pmax + (i.msa_pcs * 5);
            return { ...i, combined };
        });

        if (rankBy === 'pmax') {
            rankedIndividuals.sort((a, b) => b.pmax - a.pmax);
        } else if (rankBy === 'msa_pcs') {
            rankedIndividuals.sort((a, b) => b.msa_pcs - a.msa_pcs);
        } else {
            rankedIndividuals.sort((a, b) => b.combined - a.combined);
        }

        const rankLabels = {
            pmax: 'PMAX',
            msa_pcs: 'MSA Pcs',
            combined: 'Combined Score (PMAX + MSA×5)'
        };

        let html = `<div class="ranking-card">
            <h3>👤 Individual Sales Leaderboard: ${rankLabels[rankBy]}</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Rank</th>
                            <th>Name</th>
                            <th>Branch</th>
                            <th>PMAX</th>
                            <th>MSA Pcs</th>
                            <th>Combined Score</th>
                            <th>Days Active</th>
                        </tr>
                    </thead>
                    <tbody>`;

        rankedIndividuals.forEach((ind, index) => {
            const rank = index + 1;
            let medal = '';
            let rowClass = '';
            if (rank === 1) { medal = '🥇'; rowClass = 'rank-1'; }
            else if (rank === 2) { medal = '🥈'; rowClass = 'rank-2'; }
            else if (rank === 3) { medal = '🥉'; rowClass = 'rank-3'; }

            html += `<tr class="${rowClass}">
                <td><span class="medal">${medal}</span> #${rank}</td>
                <td><strong>${ind.name}</strong></td>
                <td>${ind.branch}</td>
                <td style="font-weight: 600;">${ind.pmax}</td>
                <td style="font-weight: 600;">${ind.msa_pcs}</td>
                <td style="font-weight: 700; color: var(--primary);">${ind.combined}</td>
                <td>${ind.days}</td>
            </tr>`;
        });

        html += `</tbody></table></div></div>`;
        container.innerHTML = html;
    }

    function exportSummaryCSV() {
        const table = document.getElementById('summaryTable');
        let csv = [];
        for (let i = 0; i < table.rows.length; i++) {
            let row = [], cols = table.rows[i].querySelectorAll("td, th");
            for (let j = 0; j < cols.length; j++) {
                let text = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, "").replace(/(\s\s)/gm, " ");
                text = text.replace(/"/g, '""');
                row.push('"' + text + '"');
            }
            csv.push(row.join(","));
        }
        const fromDate = document.getElementById('summaryFromDate').value;
        const toDate = document.getElementById('summaryToDate').value;
        const csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
        const downloadLink = document.createElement("a");
        downloadLink.download = `Summary_Report_${fromDate}_to_${toDate}.csv`;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    function clearAllData() {
        if (!confirm("⚠️ Are you sure you want to delete ALL saved reports? This cannot be undone.")) return;
        localStorage.removeItem('cabuyao_aux_reports');
        populateDailyDatePicker();
        alert("✅ All data cleared.");
    }

    window.onload = function() {
        // Start fresh - no preloaded data
        populateDailyDatePicker();
    };
</script>
